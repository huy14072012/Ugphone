<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giữ Tài Khoản</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-card { background-color: #1a1a1a; width: 100%; max-width: 360px; border-radius: 20px; padding: 25px 20px; text-align: center; border: 1px solid #2a2a2a; }
        .title { color: #007bff; font-size: 20px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .content-box { background-color: #222; padding: 15px; border-radius: 10px; font-size: 14px; text-align: left; color: #ccc; line-height: 1.6; border: 1px solid #333; }
        .btn-back { display: block; width: 100%; padding: 12px; margin-top: 20px; background-color: #444; color: #fff; text-decoration: none; font-weight: bold; border-radius: 8px; font-size: 13px; text-transform: uppercase; }
        .btn-back:hover { background-color: #555; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="title"><i class="fa-solid fa-user-shield"></i> Giữ Tài Khoản</div>
        <div class="content-box">
            <p><i class="fa-solid fa-triangle-exclamation" style="color:#ffcc00"></i> Tính năng đồng bộ bảo mật an toàn tài khoản UgPhone đang được tối ưu hóa.</p>
            <p style="margin-top: 10px;">Vui lòng không chia sẻ mã token nhận được cho bất kỳ ai để tránh mất mát thiết bị.</p>
        </div>
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
    </div>
</body>
</html>
