<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UgPhone Hub - Cày Coin Đổi Máy</title>
    <script src="kho-acc.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 650px; margin: 30px auto; background: #1f2937; padding: 30px; border-radius: 12px; border: 1px solid #374151; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h1 { color: #fff; margin-bottom: 20px; font-size: 24px; }
        p { color: #94a3b8; margin-bottom: 20px; font-size: 15px; }
        .wallet-box { background: #111827; border: 1px dashed #10b981; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; }
        .coin-amount { color: #10b981; font-weight: bold; font-size: 24px; }
        .btn-link { display: block; background: linear-gradient(135deg, #f43f5e, #e11d48); color: white; text-decoration: none; font-weight: bold; padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 16px; transition: 0.2s; }
        .btn-link:hover { transform: scale(1.02); }
        
        .shop-box { background: #111827; padding: 20px; border-radius: 8px; border: 1px solid #4b5563; text-align: left; margin-top: 25px; }
        .shop-title { color: #fff; margin-bottom: 15px; border-bottom: 2px solid #3b82f6; padding-bottom: 5px; font-size: 16px; }
        .may-list-container { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        
        .may-list-container::-webkit-scrollbar { width: 6px; }
        .may-list-container::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }

        .may-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1f2937; }
        .may-info { font-size: 14px; }
        .btn-buy { background: #10b981; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-buy:hover { background: #059669; }
        .btn-buy:disabled { background: #4b5563; color: #94a3b8; cursor: not-allowed; }

        .result-box { display: none; background: #1f2937; border: 2px solid #10b981; border-radius: 8px; padding: 15px; margin-top: 15px; }
        textarea { width: 100%; height: 110px; background: #0b0f19; color: #38bdf8; border: 1px solid #4b5563; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 12px; resize: none; margin-bottom: 10px; }
        .btn-copy { background: #3b82f6; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-copy:hover { background: #2563eb; }
        
        .cloud-link { display: block; text-decoration: none; color: inherit; margin-top: 35px; }
        .cloud-box { background: #111827; border: 2px solid #38bdf8; border-radius: 12px; padding: 25px; text-align: center; transition: 0.2s; cursor: pointer; box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .cloud-box:hover { transform: scale(1.01); background: #151f32; border-color: #0ea5e9; }
        .cloud-icon { width: 70px; height: 70px; fill: #38bdf8; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        .cloud-title { font-size: 20px; color: #38bdf8; font-weight: bold; margin-bottom: 5px; }
        .cloud-desc { font-size: 13px; color: #94a3b8; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hệ Thống Kiếm Coin & Đổi Máy Ảo</h1>
        
        <div class="wallet-box">
            Ví Coin Thiết Bị: <span id="user-coin" class="coin-amount">0</span> COIN
        </div>
        <p>Cày thêm Coin bằng cách vượt link tài trợ bên dưới:</p>
        
        <a href="https://yeulink.com/link-rut-gon-cua-ban" target="_blank" class="btn-link">🚀 Vượt Link Kiếm Coin (+6 COIN)</a>
        
        <div class="shop-box">
            <h3 class="shop-title">🛒 Chọn Máy Bạn Muốn Treo (2 Coin / Máy)</h3>
            
            <div id="danh-sach-may-ui" class="may-list-container">
                </div>

            <div id="acc-result" class="result-box">
                <p style="color: #10b981; font-weight: bold; margin-bottom: 5px; text-align: left;" id="result-title">🎉 Đổi thành công!</p>
                <textarea id="acc-text" readonly></textarea>
                <div style="text-align: right;">
                    <button onclick="copyAccount()" class="btn-copy">📋 Sao Chép Dữ Liệu</button>
                </div>
            </div>
        </div>

        <a href="https://clientclone.ayabloxtraicay.site/autobuyugphone.php" target="_blank" class="cloud-link" onclick="checkCloudStock(event)">
            <div class="cloud-box">
                <svg class="cloud-icon" viewBox="0 0 24 24">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3z"/>
                </svg>
                <div class="cloud-title">Auto Mua UgPhone</div>
                <div class="cloud-desc">Nhấn vào đây để đến hệ thống tự động mua máy ảo và nạp tiền gốc.</div>
            </div>
        </a>
    </div>

    <script>
        function loadCoin() {
            let myCoin = localStorage.getItem('guest_coin') || '0';
            document.getElementById('user-coin').innerText = myCoin;
        }

        function renderMayList() {
            if (typeof danhSachAccUgPhone === 'undefined' || danhSachAccUgPhone.length === 0) {
                document.getElementById('danh-sach-may-ui').innerHTML = "<p style='color: #f43f5e;'>Kho máy trống hoặc đang bảo trì!</p>";
                return;
            }

            let html = "";
            for (let i = 0; i < danhSachAccUgPhone.length; i++) {
                let soThuTuMay = i + 1;
                let status = localStorage.getItem('status_may_' + i);
                
                if (status === 'da_doi') {
                    html += `
                    <div class="may-item">
                        <div class="may-info"><strong>Máy Đợt ${soThuTuMay}</strong><br><span style="color: #f43f5e; font-size:12px;">🔴 Đang có người dùng</span></div>
                        <button class="btn-buy" disabled>Đã Hết</button>
                    </div>`;
                } else {
                    html += `
                    <div class="may-item">
                        <div class="may-info"><strong>Máy Đợt ${soThuTuMay}</strong><br><span style="color: #10b981; font-size:12px;">🟢 Máy Sẵn Sàng</span></div>
                        <button onclick="buySpecificMay(${i})" class="btn-buy">Đổi Ngay</button>
                    </div>`;
                }
            }
            document.getElementById('danh-sach-may-ui').innerHTML = html;
        }

        window.onload = function() {
            loadCoin();
            renderMayList();
        };
        setInterval(loadCoin, 1000);

        function buySpecificMay(indexMay) {
            let coin = parseInt(localStorage.getItem('guest_coin') || '0');

            if (coin < 2) {
                alert("Bạn không đủ Coin! Cần 2 Coin để đổi gói.");
                return;
            }

            coin -= 2;
            localStorage.setItem('guest_coin', coin.toString());
            document.getElementById('user-coin').innerText = coin;

            localStorage.setItem('status_may_' + indexMay, 'da_doi');

            let accountsInfo = danhSachAccUgPhone[indexMay];
            let soThuTuMay = indexMay + 1;
            
            document.getElementById('result-title').innerText = `🎉 Đổi thành công Máy Đợt ${soThuTuMay}!`;
            document.getElementById('acc-text').value = accountsInfo;
            document.getElementById('acc-result').style.display = "block";

            renderMayList();
        }

        function copyAccount() {
            const copyText = document.getElementById("acc-text");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            try {
                navigator.clipboard.writeText(copyText.value);
                alert("Đã sao chép dữ liệu tài khoản!");
            } catch (err) {
                document.execCommand("copy");
                alert("Đã sao chép dữ liệu tài khoản!");
            }
        }

        function checkCloudStock(event) {
            if (typeof danhSachAccUgPhone === 'undefined' || danhSachAccUgPhone.length === 0) {
                event.preventDefault();
                alert("Hết máy");
                return;
            }

            let soMayDaHet = 0;
            for (let i = 0; i < danhSachAccUgPhone.length; i++) {
                if (localStorage.getItem('status_may_' + i) === 'da_doi') {
                    soMayDaHet++;
                }
            }

            if (soMayDaHet >= danhSachAccUgPhone.length) {
                event.preventDefault();
                alert("Hết máy");
            }
        }
    </script>
</body>
</html>
