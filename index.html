<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP 1 CLOUD VN - Đổi Máy UgPhone Tự Động</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
            border: 1px solid #00e676;
        }
        h1 { color: #00e676; font-size: 24px; }
        .wallet {
            font-size: 18px;
            margin: 15px 0;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            border-left: 5px solid #ffcc00;
        }
        .btn {
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }
        /* Giữ nguyên màu nút cũ của bạn */
        .btn-link {
            background: #00e676;
        }
        .btn-link:hover { 
            background: #00b359; 
            box-shadow: 0 0 10px rgba(0,230,118,0.5); 
        }
        /* Nút mua máy mới thêm vào */
        .btn-buy {
            background: #ffcc00;
        }
        .btn-buy:hover { 
            background: #e6b800; 
            box-shadow: 0 0 10px rgba(255,204,0,0.5); 
        }
        .output-box {
            margin-top: 20px;
            background: #000;
            color: #00e676;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            font-family: monospace;
            white-space: pre-wrap;
            text-align: left;
            font-size: 12px;
            border: 1px dashed #00e676;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TOP 1 CLOUD VN 🌐</h1>
    <p>Hệ thống tự động phát Combo 3 máy UgPhone treo game</p>
    
    <div class="wallet">💰 Số dư của bạn: <span id="so-coin">0</span> Coin</div>

    <button class="btn btn-link" onclick="batDauLamNhiemVu()">VƯỢT LINK4M ĐỂ NHẬN COMBO 3 MÁY</button>
    
    <button class="btn btn-buy" onclick="moHuongDanMuaMay()">💰 MUA GÓI MÁY VIP (KHÔNG QUẢNG CÁO)</button>

    <div class="output-box" id="o-hien-thi-code">Mã Token F12 của 3 máy UgPhone sẽ xuất hiện ở đây sau khi bạn vượt link thành công...</div>
</div>

<script>
    const SUPABASE_URL = "https://nigbaxusbacupefjkyud.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_ouFEtjFpNErrwTNAj32u_w_RAKDDgMy";
    const LINK4M_URL = "https://link4m.org/6lntv";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        hienThiCoinThucTe();
        kiemTraKetQuaSauKhiVuot();
    };

    function hienThiCoinThucTe() {
        let coinHienTai = localStorage.getItem('user_coin');
        if (coinHienTai === null) {
            coinHienTai = 0;
            localStorage.setItem('user_coin', 0);
        }
        document.getElementById('so-coin').innerText = coinHienTai;
    }

    function batDauLamNhiemVu() {
        const homNay = new Date().toDateString(); 
        const ngayDaVuot = localStorage.getItem('ngay_vuot_link');

        if (ngayDaVuot === homNay) {
            alert("Bạn ơi! Mỗi ngày bạn chỉ được nhận Combo 3 máy 1 lần thôi. Hãy nhường suất cho người khác và quay lại vào ngày mai hoặc mua gói VIP nhé!");
            return;
        }

        alert("Đang chuyển hướng bạn đến nhiệm vụ Link4M để lấy mã...");
        window.location.href = LINK4M_URL;
    }

    // Hàm hiện bảng giá khi bấm nút Mua máy
    function moHuongDanMuaMay() {
        alert("🌟 BẢNG GIÁ GÓI MÁY VIP (KHÔNG QUẢNG CÁO):\n\n" +
              "• Gói 1: Combo 3 máy dùng trong ngày giá: 5.000đ\n" +
              "• Gói 2: Combo 3 máy dùng trong tuần giá: 25.000đ\n\n" +
              "👉 Để mua gói VIP, bạn vui lòng liên hệ Admin hoặc chuyển khoản trực tiếp nhé!");
    }

    async function kiemTraKetQuaSauKhiVuot() {
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('status') === 'success' || window.location.search.includes('status=success')) {
            
            document.getElementById('o-hien-thi-code').innerText = "🔄 Đang bốc 3 máy từ kho Supabase, vui lòng chờ trong giây lát...";

            const { data: danhSachMay, error } = await _supabase
                .from('kho_may')
                .select('*')
                .eq('trang_thai', 'trong')
                .limit(3);

            if (error || !danhSachMay || danhSachMay.length < 3) {
                document.getElementById('o-hien-thi-code').innerText = "❌ HẾT MÁY! Kho máy hiện tại không đủ 3 con, vui lòng báo Admin nạp thêm!";
                return;
            }

            let chuoiKetQua = "🎉 VƯỢT LINK THÀNH CÔNG! ĐÂY LÀ 3 MÁY CỦA BẠN:\n\n";
            let danhSachId = [];

            danhSachMay.forEach((may, index) => {
                chuoiKetQua += `📱 MÁY SỐ ${index + 1}:\n${may.token}\n-----------------------\n`;
                danhSachId.push(may.id);
            });

            document.getElementById('o-hien-thi-code').innerText = chuoiKetQua;

            for (let id of danhSachId) {
                await _supabase
                    .from('kho_may')
                    .update({ trang_thai: 'da_ban' })
                    .eq('id', id);
            }

            let coinMoi = parseInt(localStorage.getItem('user_coin') || 0) + 100;
            localStorage.setItem('user_coin', coinMoi);
            document.getElementById('so-coin').innerText = coinMoi;

            const homNay = new Date().toDateString();
            localStorage.setItem('ngay_vuot_link', homNay);
            
            alert("Chúc mừng bạn đã nhận thành công Combo 3 máy UgPhone!");
        }
    }
</script>

</body>
</html>
