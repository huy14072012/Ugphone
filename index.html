<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đổi Máy UgPhone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* KHỐI HỘP ĐEN CHÍNH CHUẨN ĐẸP NHƯ ẢNH GỐC CỦA BẠN */
        .main-card {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.5);
        }

        .main-title {
            color: #00e676; /* Màu xanh lá đặc trưng */
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        .sub-title {
            color: #ffcc00; /* Màu vàng ví tiền xu */
            font-size: 24px;
            font-weight: bold;
            background-color: #262626;
            padding: 14px;
            border-radius: 10px;
            margin: 20px auto;
            width: 90%;
        }

        /* ĐỊNH DẠNG NÚT BẤM CHUẨN KHÔNG BỊ TRÀN CHỮ */
        .btn-custom {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            padding: 14px 16px;
            margin: 8px auto;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            color: #ffffff;
        }

        .btn-blue {
            background-color: #007bff;
        }

        .btn-green {
            background-color: #28a745;
        }

        /* KHUNG NÉT ĐỨT MÀU XANH LÁ */
        .success-box {
            border: 2px dashed #00e676;
            border-radius: 12px;
            padding: 15px;
            margin: 20px auto 0 auto;
            width: 90%;
            background-color: transparent;
        }

        .success-title {
            color: #00e676;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .info-text {
            color: #cccccc;
            font-size: 13px;
            margin-bottom: 12px;
        }

        /* BẢNG HIỂN THỊ MÃ CODE KHÔNG BỊ PHÁ GIAO DIỆN */
        .account-table {
            width: 100%;
            margin: 10px 0 15px 0;
            border-collapse: collapse;
            background-color: #222222;
            border-radius: 6px;
            overflow: hidden;
        }

        .account-table td {
            padding: 10px;
            font-size: 12px;
            text-align: left;
            border-bottom: 1px solid #333333;
            color: #ffffff;
            vertical-align: middle;
        }

        .table-label {
            width: 30%;
            font-weight: bold;
            color: #aaaaaa;
        }

        /* Ô CHỨA JSON CHỐNG TRÀN CHỮ TUYỆT ĐỐI */
        .json-textarea {
            width: 100%;
            height: 75px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #121212;
            color: #00e676;
            font-family: monospace;
            font-size: 11px;
            resize: none;
            outline: none;
            white-space: pre-wrap; /* Tự động xuống hàng khi chuỗi quá dài */
            word-wrap: break-word;
        }

        .btn-copy {
            width: 100%;
            margin-top: 6px;
            padding: 6px;
            background-color: #ffcc00;
            color: #000000;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* NÚT ĐÁM MÂY XANH DƯƠNG */
        .btn-cloud {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            box-shadow: 0px 4px 15px rgba(0, 114, 255, 0.4);
            margin: 5px 0 0 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="main-title">HỆ THỐNG ĐỔI MÁY</h1>
        <h1 class="main-title">UGPHONE</h1>

        <div class="sub-title">Ví của bạn: <span id="userCoin">0</span> COIN</div>

        <a href="https://link4m.com/your-link" target="_blank" class="btn-custom btn-blue">
            🔗 VƯỢT LINK NHẬN COIN (+6 COIN)
        </a>

        <button class="btn-custom btn-green" onclick="batDauDoiMay()">
            🎁 ĐỔI MÁY NGAY (Tốn 2 Coin)
        </button>

        <div id="successBox" class="success-box" style="display: none;">
            <p class="success-title">🎉 ĐỔI MÁY THÀNH CÔNG!</p>
            <p class="info-text">Đã trừ 2 Coin trong ví của bạn.</p>

            <table class="account-table">
                <tbody>
                    <tr>
                        <td class="table-label">Hạn máy:</td>
                        <td style="color: #00e676; font-weight: bold;">Mới tinh (4 Giờ)</td>
                    </tr>
                    <tr>
                        <td class="table-label" style="vertical-align: top; padding-top: 12px;">Mã Code:</td>
                        <td>
                            <textarea id="jsonTokenArea" class="json-textarea" readonly placeholder="Đang bốc code từ kho..."></textarea>
                            <button class="btn-copy" onclick="copyUgPhoneToken()">📋 Sao chép mã</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <a href="https://www.ugphone.com" target="_blank" class="btn-custom btn-cloud">
                ☁️ auto mua máy và quick login code
            </a>
        </div>
    </div>

    <script>
        // --- ĐIỀN THÔNG TIN SUPABASE CỦA BẠN VÀO ĐÂY ---
        const SUPABASE_URL = "https://your-project-id.supabase.co";
        const SUPABASE_KEY = "your-anon-key";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const USER_ID = "user_test_123"; // Thay bằng ID user của bạn

        // Tự động load xu
        async function loadUserCoin() {
            try {
                let { data } = await _supabase.from('users').select('coin').eq('id', USER_ID).single();
                if (data) document.getElementById("userCoin").innerText = data.coin;
            } catch (err) { console.error("Lỗi tải ví xu:", err); }
        }
        loadUserCoin();

        // Hàm click mua máy bốc từ kho
        async function batDauDoiMay() {
            let { data: user } = await _supabase.from('users').select('coin').eq('id', USER_ID).single();
            if (!user || user.coin < 2) {
                alert("Bạn không đủ Coin!");
                return;
            }

            // Bốc 1 mã status 'chua_dung' từ bảng 'kho_may'
            let { data: khoMay, error: errKho } = await _supabase
                .from('kho_may')
                .select('*')
                .eq('status', 'chua_dung')
                .limit(1)
                .single();

            if (errKho || !khoMay) {
                alert("Hết máy trong kho rồi bạn ơi!");
                return;
            }

            // Trừ xu và update kho máy sang 'da_dung'
            await _supabase.from('users').update({ coin: user.coin - 2 }).eq('id', USER_ID);
            await _supabase.from('kho_may').update({ status: 'da_dung', user_get: USER_ID }).eq('id', khoMay.id);

            // Cập nhật số xu trên web công khai
            document.getElementById("userCoin").innerText = user.coin - 2;

            // Đổ chuỗi JSON bốc được vào ô text rồi hiện bảng
            document.getElementById("jsonTokenArea").value = khoMay.json_data; 
            document.getElementById("successBox").style.display = "block";
        }

        // Hàm sao chép mã nhanh
        function copyUgPhoneToken() {
            let copyText = document.getElementById("jsonTokenArea");
            if (copyText.value === "") return;

            copyText.select();
            copyText.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("Đã sao chép mã JSON UgPhone thành công!");
            }).catch(err => {
                alert("Trình duyệt chặn, hãy đè tay vào ô chữ để tự copy nha.");
            });
        }
    </script>
</body>
</html>
