<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xử lý cộng Coin...</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 100px; }
        .loading-box { max-width: 450px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #ffcc00; }
        h2 { color: #ffcc00; }
        .error-text { color: #ff3333 !important; }
    </style>
</head>
<body>
<div class="loading-box">
    <h2 id="tieu-de">🎉 VƯỢT LINK THÀNH CÔNG!</h2>
    <p id="noi-dung">Hệ thống đang xử lý cộng xu...</p>
</div>
<script>
    window.onload = function() {
        let daNhanLượtNay = localStorage.getItem('da_nhan_coin_roi');
        let coinHienTai = parseInt(localStorage.getItem('user_coin') || 0);
        const COIN_TOI_DA_MOI_NGAY = 500;

        // Chống spam lượt cũ hoặc cố tình hack ví khi đã chạm ngưỡng 500 xu
        if (daNhanLượtNay === "true" || coinHienTai >= COIN_TOI_DA_MOI_NGAY) {
            document.getElementById('tieu-de').innerText = "❌ CẢNH BÁO GIỚI HẠN!";
            document.getElementById('tieu-de').className = "error-text";
            document.getElementById('noi-dung').innerText = "Bạn đã đạt giới hạn nhận tối đa 500 Coin của ngày hôm nay rồi! Vui lòng quay lại sau 00:00 đêm.";
            document.getElementById('noi-dung').className = "error-text";
            setTimeout(function() { window.location.href = "index.html"; }, 3000);
            return; 
        }

        // Thực hiện cộng đúng 500 xu cho lượt làm nhiệm vụ thành công
        localStorage.setItem('user_coin', coinHienTai + 500);
        localStorage.setItem('da_nhan_coin_roi', "true");

        const homNay = new Date().toDateString();
        localStorage.setItem('ngay_vuot_link', homNay);
        localStorage.setItem('ngay_he_thong', homNay);

        document.getElementById('noi-dung').innerText = "Đã cộng thành công 500 Coin vào ví! Đang đưa bạn quay lại trang chủ để thực hiện đổi máy...";
        setTimeout(function() { window.location.href = "index.html"; }, 2500);
    };
</script>
</body>
</html>
