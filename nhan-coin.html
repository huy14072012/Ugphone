<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Nhận Nhận Coin Chống Hack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            margin: 80px auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { color: #ffcc00; }
        .notice {
            background: #2d2d2d;
            padding: 15px;
            border-left: 4px solid #ffcc00;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
        .btn-claim {
            width: 100%;
            padding: 14px;
            background-color: #ffcc00;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-claim:hover { background-color: #e6b800; }
    </style>
</head>
<body>

<div class="container" id="main-box">
    <h2>🔄 ĐANG KIỂM TRA LƯỢT VƯỢT LINK...</h2>
    <p style="color: #aaa;">Vui lòng đợi trong giây lát...</p>
</div>

<script>
    // Kết nối Supabase
    const SUPABASE_URL = "https://nigbaxusbacupefjkyud.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ouFEtjFpNErrwTNAj32u_w_RAKDDgMy";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Chạy kiểm tra ngay khi vừa đặt chân vào trang
    kiemTraVaCongCoin();

    async function kiemTraVaCongCoin() {
        try {
            // 1. Tìm xem trên Supabase có cái Token nào được tạo ra trong vòng 15 phút qua không
            const thoiGianHetHan = Date.now() - (15 * 60 * 1000); // 15 phút
            
            const { data: danhSachToken, error: errToken } = await _supabase
                .from('token_nhan_coin')
                .select('*')
                .gt('thoi_gian_tao', thoiGianHetHan)
                .limit(1);

            // NẾU KHÔNG CÓ TOKEN NÀO -> CHẶN LUÔN (Do vào lén hoặc đã dùng rồi)
            if (errToken || !danhSachToken || danhSachToken.length === 0) {
                hienLoi("Mã nhận thưởng không tồn tại hoặc đã hết hạn! Vui lòng quay lại trang chủ vượt link lại.");
                return;
            }

            const tokenHopLe = danhSachToken[0];

            // 2. XÓA LUÔN TOKEN NÀY TRÊN SUPABASE (Xé vé - Chỉ cho dùng 1 lần)
            const { error: errXoa } = await _supabase
                .from('token_nhan_coin')
                .delete()
                .eq('id', tokenHopLe.id);

            if (errXoa) {
                hienLoi("Hệ thống trục trặc khi hủy mã xác thực!");
                return;
            }

            // 3. TIẾN HÀNH CỘNG COIN VÀO MÁY NGƯỜI DÙNG (Lưu vào localStorage cũ của bạn)
            let currentCoin = parseInt(localStorage.getItem('user_coins')) || 0;
            currentCoin += 6;
            localStorage.setItem('user_coins', currentCoin);

            // Giao diện thông báo thành công đẹp mắt
            document.getElementById('main-box').innerHTML = `
                <h2 style="color: #00ff88;">🎉 VƯỢT LINK THÀNH CÔNG!</h2>
                <div class="notice">
                    <strong>Hệ thống xác nhận:</strong> Mã token hợp lệ. Đã cộng thành công <strong>+6 Coin</strong> vào ví trên máy của bạn!
                </div>
                <button class="btn-claim" style="background-color: #007bff; color: white;" onclick="window.location.href='index.html'">Quay lại Trang Chủ</button>
            `;

            alert("Bạn được cộng +6 Coin!");

        } catch (e) {
            hienLoi("Lỗi xử lý hệ thống ngoài ý muốn!");
        }
    }

    function hienLoi(noiDung) {
        document.getElementById('main-box').innerHTML = `
            <h2 style="color: #ff4d4d;">❌ TRUY CẬP BỊ TỪ CHỐI!</h2>
            <p style="font-size: 15px; margin-top: 15px; color: #aaa;">${noiDung}</p>
            <button class="btn-claim" style="background-color: #dc3545; color: white; margin-top: 15px;" onclick="window.location.href='index.html'">Quay lại Trang Chủ</button>
        `;
    }
</script>

</body>
</html>
