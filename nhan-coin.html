<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Nhận Nhận Coin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            margin: 80px auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { color: #ffcc00; }
        .notice {
            background: #2d2d2d;
            padding: 15px;
            border-left: 4px solid #ffcc00;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
        .btn-claim {
            width: 100%;
            padding: 14px;
            background-color: #ffcc00;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-claim:hover { background-color: #e6b800; }
    </style>
</head>
<body>

<div class="container" id="main-box">
    <h2>🎉 VƯỢT LINK THÀNH CÔNG!</h2>
    <div class="notice">
        <strong>Chúc mừng bạn!</strong> Bạn đã hoàn thành nhiệm vụ vượt link quảng cáo. Bấm nút bên dưới để cộng 6 Coin vào ví.
    </div>
    
    <button class="btn-claim" onclick="congCoin()">💰 NHẬN 6 COIN NGAY</button>
</div>

<script>
    // Kiểm tra xem trong phiên truy cập này người dùng đã bấm nhận coin chưa
    const daNhanTrongPhien = sessionStorage.getItem('da_nhan_coin_phien_nay');

    // NẾU ĐÃ NHẬN RỒI -> KHÓA LUÔN, BẤM LẦN 2 SẼ BỊ CHẶN
    if (daNhanTrongPhien === 'true') {
        document.getElementById('main-box').innerHTML = `
            <h2 style="color: #ff4d4d;">❌ LƯỢT NHẬN ĐÃ HẾT HẠN!</h2>
            <p style="font-size: 15px; margin-top: 15px; color: #aaa;">Mỗi lần vượt link bạn chỉ được bấm nút nhận coin đúng 1 lần duy nhất.</p>
            <p style="color: #ffcc00; font-weight: bold;">Vui lòng quay lại trang chủ và thực hiện lượt vượt link mới!</p>
            <button class="btn-claim" style="background-color: #007bff; color: white; margin-top: 15px;" onclick="window.location.href='index.html'">Quay lại Trang Chủ</button>
        `;
    }

    function congCoin() {
        // Đánh dấu ngay lập tức là đã nhận coin rồi
        sessionStorage.setItem('da_nhan_coin_phien_nay', 'true');

        // Cộng coin vào ví máy người dùng
        let currentCoin = parseInt(localStorage.getItem('user_coins')) || 0;
        currentCoin += 6;
        localStorage.setItem('user_coins', currentCoin);
        
        alert("Đã cộng 6 Coin vào tài khoản của bạn!");
        window.location.href = "index.html"; 
    }
</script>

</body>
</html>
