<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xử lý cộng Coin...</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .loading-box {
            max-width: 400px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #ffcc00;
        }
        h2 { color: #ffcc00; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ffcc00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="loading-box">
    <h2>🎉 VƯỢT LINK THÀNH CÔNG!</h2>
    <div class="loader"></div>
    <p id="thong-bao">Hệ thống đang cộng 500 Coin vào tài khoản của bạn...</p>
</div>

<script>
    window.onload = function() {
        // 1. Cộng thẳng 500 Coin vào bộ nhớ máy của khách
        let coinHienTai = parseInt(localStorage.getItem('user_coin') || 0);
        let coinMoi = coinHienTai + 500; // Cộng 500 coin để đủ tiền mua combo
        localStorage.setItem('user_coin', coinMoi);

        // 2. Đánh dấu hôm nay thiết bị này đã nhận coin để chặn vượt tiếp
        const homNay = new Date().toDateString();
        localStorage.setItem('ngay_vuot_link', homNay);

        document.getElementById('thong-bao').innerText = "Đã cộng thành công 500 Coin! Đang đưa bạn quay lại trang chủ để MUA MÁY...";

        // 3. Đợi 2 giây cho khách kịp nhìn rồi tự động tự đá về trang chủ index.html
        setTimeout(function() {
            window.location.href = "index.html"; 
        }, 2000);
    };
</script>

</body>
</html>
